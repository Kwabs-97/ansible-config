table inet filter{
    chain input {
        type filter hook input priority 0; policy drop;

        # Accept all traffic on the loopback  interface (localhost)
        iif "lo" accept;

        # Allow packets that are part of established/related connections
        ct state established, related accept

        # Allow traffic on port 44422
        tcp dport 44422 accept

        # Allow incoming HTTP/HTTPS responses
        tcp sport { 80, 443 } ct state established accept

        # Allow incoming DNS responses
        udp sport 53 accept
        tcp sport 53 accept

        # Allow icmp traffic (ping, etc)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # Reject other traffic 
        ip protocol tcp reject  with tcp reset
        ip protocol upd reject with icmp port-unreachable
        reject with icmp port-unreachable
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook forward priority 0; policy accept;

        # Allow outbound DNS 
        udp dport 53 accept
        tcp dport 53 accept

        # Allow outbound HTTP/HTTPS explicitly
        tcp dport { 80, 443 } ct state { new, established } accept
    }
}